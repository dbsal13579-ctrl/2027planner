<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>2026 합격 플래너 v25</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');

    :root { --pc: #4BD9A9; --pc-rgb: 75,217,169; --pc-solid: #23D196; --pc-solid-rgb: 35,209,150; --bg-soft:#f7f8fc; --ink:#0f172a; }

.nav-box {
    background: linear-gradient(135deg, rgba(var(--pc-rgb), 0.08) 0%, rgba(255,255,255,0.96) 55%, rgba(var(--pc-rgb), 0.04) 100%);
    border-radius: 28px;
    padding: 22px 26px;
    box-shadow: 0 14px 32px rgba(var(--pc-rgb), 0.12);
    position: relative;
}

.nav-box-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
}

.nav-box-center {
    flex: 1;
    text-align: center;
}

.nav-box-kicker {
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 0.22em;
    color: var(--pc);
    text-transform: uppercase;
    opacity: 0.85;
}

.nav-box-title {
    font-size: 28px;
    font-weight: 900;
    color: var(--pc);
    line-height: 1.1;
    margin-top: 6px;
}

.nav-box-sub {
    font-size: 16px;
    font-weight: 700;
    color: #64748b;
    margin-top: 4px;
}

.nav-box-strong {
    color: var(--pc);
    font-weight: 900;
}

.nav-box-time {
    color: var(--pc);
    font-weight: 900;
    font-size: 30px;
    line-height: 1;
    letter-spacing: -0.04em;
}

.nav-box-btn {
    min-width: 120px;
    height: 52px;
    padding: 0 18px;
    border-radius: 18px;
    border: none;
    background: rgba(var(--pc-rgb), 0.10);
    color: var(--pc);
    font-size: 17px;
    font-weight: 900;
    transition: all 0.18s ease;
}

.nav-box-btn:hover {
    background: rgba(var(--pc-rgb), 0.16);
    transform: translateY(-1px);
}

@media (max-width: 480px) {
    .cal-grid { gap:4px; }
    .cal-cell {
        min-height:64px;
        padding:6px 3px;
        border-radius:12px;
    }
    .cal-cell .text-\[20px\] { font-size:14px !important; }
    .cal-cell .text-\[18px\] { font-size:12px !important; }
    .cal-cell .text-\[15px\] { font-size:10px !important; }
    .cal-cell-tasks { margin-top:4px; padding-top:3px; }
    .cal-cell.cal-cell-expanded { min-height:120px; }
}

@media (max-width: 640px) {
    /* 진도 탭: 항목별 액션 버튼(＋플래너/수정/숨기기/삭제)이 좁은 화면에서도 눌리기 쉽게 */
    #progress-container button {
        padding: 4px 6px;
        min-height: 26px;
    }
    #progress-container .card { padding: 16px; }
}

@media (max-width: 640px) {
    nav .view-tab { padding:8px 12px; font-size:13px; }
    nav #vtab-bulk { padding:8px 10px !important; }
    nav #theme-palette { width:180px; }
    nav #theme-palette button { width:10px; height:10px; }
    nav h1.text-lg { font-size:15px; }
}

@media (max-width: 480px) {
    nav .view-tab { padding:6px 8px; font-size:11px; }
    nav #vtab-bulk { padding:6px 8px !important; }
    nav #theme-palette { width:150px; gap:3px; }
    nav #theme-palette button { width:8px; height:8px; }
}

@media (max-width: 768px) {
    .nav-box {
        padding: 14px 16px;
        border-radius: 22px;
    }

    .nav-box-inner {
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
    }

    .nav-box-center {
        order: -1;
        text-align: left;
    }

    .nav-box-btn {
        width: 100%;
        min-width: 0;
        height: 42px;
        font-size: 15px;
        border-radius: 14px;
    }

    .nav-box-title {
        font-size: 22px;
        margin-top: 0;
    }

    .nav-box-sub {
        margin-top: 2px;
    }

    .nav-box-time {
        font-size: 24px;
    }
}



        body {
            font-family:'Pretendard',sans-serif;
            background:
                radial-gradient(circle at top left, rgba(var(--pc-rgb),.08), transparent 22%),
                radial-gradient(circle at top right, rgba(var(--pc-rgb),.05), transparent 18%),
                linear-gradient(180deg, #f8fbff 0%, #f4f7fb 35%, #f7f8fc 100%);
            color:#1e293b;
        }

        .text-pc   { color: var(--pc-solid); }
        .bg-pc     { background-color: var(--pc-solid); }
        .border-pc { border-color: var(--pc); }

        /* D-Day — compact */
        #dday-banner {
            border-bottom: 3px solid var(--pc);
        }
        .dday-manager-toggle {
            background: rgba(255,255,255,.14);
            border: 1px solid rgba(255,255,255,.22);
            color: white;
            border-radius: 999px;
            padding: 10px 18px;
            font-size: 16px;
            font-weight: 800;
            backdrop-filter: blur(8px);
        }
        .dday-manager-toggle:hover { background: rgba(255,255,255,.20); }
        .dday-manager-card {
            background: rgba(255,255,255,.95);
            border: 1px solid rgba(226,232,240,.9);
            border-radius: 22px;
            box-shadow: 0 18px 40px rgba(15,23,42,.10);
        }

        /* Card */
        #section-planner.hidden, #section-records.hidden, #section-progress.hidden, #section-timer.hidden, #section-calendar.hidden { display:none !important; }

        .pi-date-input{
            -webkit-appearance:none; appearance:none;
            box-sizing:border-box;
            min-width:0;
            color-scheme:light;
            min-height:38px;
        }
        .pi-date-input::-webkit-date-and-time-value{ text-align:left; }

        .card {
            background:rgba(255,255,255,.92);
            border-radius:24px;
            border:1px solid rgba(226,232,240,.9);
            box-shadow:0 16px 40px rgba(148,163,184,.14);
            backdrop-filter:blur(10px);
        }

        .hero-panel {
            background:
                linear-gradient(135deg, rgba(var(--pc-solid-rgb),.96) 0%, rgba(var(--pc-solid-rgb),.88) 100%);
            color:white;
            border-radius:30px;
            box-shadow:0 22px 50px rgba(var(--pc-solid-rgb),.20);
            overflow:hidden;
            position:relative;
        }
        .hero-panel::before {
            content:'';
            position:absolute;
            inset:auto -60px -90px auto;
            width:260px;
            height:260px;
            border-radius:50%;
            background:rgba(255,255,255,.20);
        }
        .hero-panel::after {
            content:'';
            position:absolute;
            inset:20px auto auto 58%;
            width:110px;
            height:110px;
            border-radius:28px;
            transform:rotate(16deg);
            background:rgba(255,255,255,.16);
        }

        .metric-card {
            background:linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
            border:1px solid rgba(226,232,240,.9);
            border-radius:22px;
            padding:16px 18px;
            box-shadow:0 12px 24px rgba(148,163,184,.10);
        }
        .metric-eyebrow { font-size:11px; font-weight:900; letter-spacing:.18em; color:#94a3b8; text-transform:uppercase; }
        .metric-value { font-size:34px; line-height:1; font-weight:900; color:var(--pc); letter-spacing:-.03em; }
        .metric-sub { font-size:12px; color:#64748b; font-weight:700; margin-top:6px; }

        /* Progress */
        .prog-bg   { background:#edf2f7; height:8px; border-radius:999px; overflow:hidden; }
        .prog-fill {
            height:100%;
            background:linear-gradient(90deg, rgba(var(--pc-rgb),.72) 0%, rgba(var(--pc-rgb),1) 100%);
            border-radius:999px;
            transition:width .5s;
        }

        /* Calendar */
        .cal-grid  { display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); gap:8px; }
        .cal-cell  {
            background:white;
            min-height:82px;
            min-width:0;
            padding:10px 9px;
            cursor:pointer;
            transition:transform .15s, box-shadow .15s, opacity .15s;
            position:relative;
            border-radius:20px;
            border:1px solid rgba(226,232,240,.9);
            box-shadow:0 8px 20px rgba(148,163,184,.10);
            overflow:hidden;
        }
        .cal-cell:hover { transform:translateY(-2px); box-shadow:0 14px 28px rgba(148,163,184,.14); }
        .cal-cell.is-today { outline:2.5px solid var(--pc); outline-offset:-2px; }
        .task-line { font-size:14px; line-height:1.4; color:#475569; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
        .task-line .subj { color:var(--pc); font-weight:800; }
        .cal-cell.cal-cell-expanded { min-height:170px; }
        .cal-cell-summary { text-align:center; }
        .cal-cell-tasks { margin-top:10px; padding-top:8px; border-top:1px solid rgba(226,232,240,.9); }
        .cal-cell-tasks .task-line { white-space:normal; overflow:visible; text-overflow:clip; font-size:11px; line-height:1.35; margin-bottom:4px; word-break:break-word; }
        .month-toggle-btn {
            min-width: 132px;
            height: 44px;
            padding: 0 16px;
            border-radius: 16px;
            border: none;
            background: rgba(var(--pc-rgb), 0.10);
            color: var(--pc);
            font-size: 14px;
            font-weight: 900;
            transition: all 0.18s ease;
        }
        .month-toggle-btn:hover { background: rgba(var(--pc-rgb), 0.16); transform: translateY(-1px); }
        .save-img-btn {
            min-width: 108px;
            height: 44px;
            padding: 0 14px;
            border-radius: 16px;
            border: none;
            background: rgba(100,116,139,0.10);
            color: #475569;
            font-size: 13px;
            font-weight: 900;
            transition: all 0.18s ease;
            white-space: nowrap;
        }
        .save-img-btn:hover { background: rgba(100,116,139,0.18); transform: translateY(-1px); }
        .save-img-btn:disabled { opacity:.6; }


        /* Week layout */
        .week-grid { display:flex; flex-direction:column; gap:8px; }
        .week-row {
            display:grid;
            grid-template-columns:repeat(3, minmax(0, 1fr));
            gap:0;
            background:linear-gradient(180deg, rgba(255,255,255,.96) 0%, rgba(248,250,252,.96) 100%);
            border:1px solid rgba(var(--pc-rgb),.16);
            border-radius:12px;
            overflow:hidden;
        }
        .week-row.week-row-bottom { grid-template-columns:repeat(3, minmax(0, 1fr)); }
        .week-slot {
            min-width:0;
            padding:8px 10px;
            background:transparent;
        }
        .week-slot + .week-slot { border-left:1px solid rgba(226,232,240,.78); }
        .week-slot.week-slot-memo { grid-column: span 2; }
        .week-slot.is-today { background:linear-gradient(180deg, rgba(var(--pc-rgb),.11) 0%, rgba(var(--pc-rgb),.05) 100%); }
        .week-slot-head { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; margin-bottom:8px; padding-bottom:8px; border-bottom:1px solid rgba(var(--pc-rgb),.12); }
        .week-slot-head-main { display:flex; align-items:baseline; gap:8px; min-width:0; }
        .week-slot-body { line-height:1.25; }
        .week-memo-textarea { min-height:120px; }
        @media (max-width: 768px) {
            .week-grid { gap:6px !important; }
            .week-row { grid-template-columns:repeat(3, minmax(0, 1fr)) !important; }
            .week-row.week-row-bottom { grid-template-columns:repeat(3, minmax(0, 1fr)) !important; }
            .week-row { border-radius:8px !important; }
            .week-slot { padding:6px 7px !important; }
            .week-slot.week-slot-memo { grid-column: span 2; }
            .week-slot-head { margin-bottom:6px !important; padding-bottom:6px !important; }
            .week-memo-textarea { min-height:100px !important; }
        }

        /* Timer card */
        .timer-card { background:linear-gradient(180deg, #ffffff 0%, #f8fbff 100%); border:1.5px solid #e2e8f0; border-radius:18px; padding:13px 15px; margin-bottom:10px; transition:border-color .2s, background .2s, transform .15s; box-shadow:0 10px 22px rgba(148,163,184,.08); }
        .timer-card.is-on   { border-color:var(--pc); background:rgba(var(--pc-rgb),.04); }
        .timer-card.is-done { opacity:.42; }
        .timer-card:hover { transform:translateY(-1px); }

        /* Heatmap cell */
        .heat-cell { border-radius:14px; aspect-ratio:1/1; width:100%; padding-top:4px; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; gap:2px; cursor:pointer; transition:opacity .15s, transform .15s; border:1px solid #e2e8f0; }
        .heat-cell:hover { opacity:.88; transform:translateY(-1px); }

        /* Main tabs */
        .main-tab { flex:1; padding:20px 0; text-align:center; font-weight:800; font-size:22px; cursor:pointer; color:#94a3b8; border-top:3px solid transparent; transition:all .2s; }
        .main-tab.active { color:var(--pc); border-top-color:var(--pc); font-weight:900; background:rgba(var(--pc-rgb),.04); }

        /* View tabs */
        .view-tab { padding:11px 22px; border-radius:12px; font-size:17px; font-weight:800; transition:all .2s; color:#94a3b8; cursor:pointer; }
        .view-tab.active { background:var(--pc-solid); color:white; }

        /* Records tabs */
        .rec-tab { padding:9px 24px; border-radius:999px; font-size:16px; font-weight:700; cursor:pointer; transition:all .2s; }
        .rec-tab.active { background:var(--pc-solid); color:white; }

        /* Toast */
        #toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(50px); background:#1e293b; color:white; padding:10px 20px; border-radius:12px; font-weight:700; font-size:13px; z-index:999; transition:transform .3s,opacity .3s; opacity:0; pointer-events:none; white-space:nowrap; }
        #toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

        /* Modal */
        #bulk-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
        #time-edit-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
        .time-edit-block-row { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid #f1f5f9; }
        .time-edit-block-row input[type=time] { flex:1; min-width:0; border:1px solid #e2e8f0; border-radius:10px; padding:8px 6px; font-size:15px; font-weight:700; color:#334155; outline:none; }
        .time-edit-block-row input[type=time]:focus { border-color:var(--pc); }
        .time-edit-remove-btn { color:#cbd5e1; font-size:14px; font-weight:700; padding:6px 8px; white-space:nowrap; }
        .time-edit-remove-btn:hover { color:#ef4444; }
        @media (max-width: 420px) {
            .time-edit-block-row input[type=time] { font-size:13px; padding:7px 4px; }
            .time-edit-remove-btn { font-size:12px; padding:6px 4px; }
        }

        @keyframes fadeUp { from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);} }
        .fade-up { animation:fadeUp .22s ease; }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; }
        input[type=number] { -moz-appearance:textfield; }

        .section-kicker { font-size:11px; font-weight:900; letter-spacing:.2em; color:#94a3b8; text-transform:uppercase; }
        .panel-title { font-size:26px; font-weight:900; color:#0f172a; letter-spacing:-.03em; }
        .soft-divider { border-top:1px solid rgba(226,232,240,.8); }

        .day-hero {
            padding: 22px 28px;
            border-radius: 30px;
            background:
                linear-gradient(135deg, rgba(var(--pc-rgb), 0.08) 0%, rgba(255,255,255,0.97) 48%, rgba(var(--pc-rgb), 0.04) 100%);
            box-shadow: 0 18px 38px rgba(var(--pc-rgb), 0.10);
        }

        .day-hero-grid {
            display: grid;
            grid-template-columns: 160px minmax(0, 1fr) 160px;
            align-items: center;
            gap: 18px;
        }

        .day-nav-btn {
            height: 72px;
            border: none;
            border-radius: 24px;
            background: rgba(var(--pc-rgb), 0.10);
            color: var(--pc);
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -0.03em;
        }

        .day-title-kicker {
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 0.28em;
            color: #64748b;

        }

        .day-title-main {
            margin-top: 6px;
            font-size: 52px;
            line-height: 1;
            font-weight: 900;
            color: var(--pc);
            letter-spacing: -0.05em;
        }

        .day-title-sub {
            margin-top: 10px;
            display: flex;
            justify-content: center;

            flex-wrap: wrap;

        .day-main-grid {

        .day-task-card {

        .day-task-title {

        .day-task-actual {

            border: 1px solid #e2e8f0;
            border-radius: 8px;

        .day-task-page-meta {

        }

        .day-task-time {

            letter-spacing: -0.04em;
            white-space: nowrap;
        }

        .day-task-btn {
            font-size: 17px;
            font-weight: 500;
            padding: 5px 8px;
            border-radius: 999px;
            white-space: nowrap;
        }

            font-weight: 500;

        .day-task-placeholder {

        .day-subject-edit-btn:disabled { opacity:.4; pointer-events:none; }

<!-- ══════ 타이머 섹션 ══════ -->
<div class="hidden max-w-5xl mx-auto px-3 mt-5" id="section-timer">
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Left: 타이머 -->
<div>
<div class="card p-5 mb-4">
<div class="flex justify-between items-center mb-3">
<div class="flex items-center gap-3">
<input class="bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm font-bold text-pc outline-none focus:border-pc transition-colors" id="timer-date-input" type="date"/>
<button class="text-xs text-slate-400 font-bold hover:text-pc transition-colors" onclick="goTimerToday()">오늘</button>
</div>
<div class="text-right">
<div class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">총 공부</div>
<div class="text-2xl font-black text-pc" id="timer-total-display">00:00</div>
</div>
</div>
<div class="prog-bg">
<div class="prog-fill" id="timer-prog-fill" style="width:0%"></div>
</div>
</div>
<div id="timer-subjects"></div>
<!-- Free subject add -->
<div class="card p-4 mt-3">
<div class="text-[11px] font-black text-slate-400 mb-2 uppercase tracking-wider">➕ 과목 직접 추가</div>
<div class="flex gap-2">
<input class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm outline-none focus:border-pc transition-colors font-medium" id="free-name" onkeydown="if(event.key==='Enter')addFreeSubject()" placeholder="과목명"/>
<input class="w-16 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm outline-none focus:border-pc transition-colors text-center font-medium" id="free-min" onkeydown="if(event.key==='Enter')addFreeSubject()" placeholder="분" type="number"/>
<button class="bg-pc text-white px-4 rounded-xl font-black text-sm hover:opacity-80 transition-all" onclick="addFreeSubject()">추가</button>
</div>
</div>
</div>
<!-- Right: 타임라인 차트 -->
<div class="card p-4">
<div class="text-xs font-black text-slate-400 uppercase tracking-wider mb-3">📊 오늘의 공부 타임라인</div>
<div id="timeline-chart" style="overflow-y:auto;max-height:580px;"></div>
</div>
</div>
</div>
<!-- ══════ 기록 섹션 ══════ -->
<div class="hidden max-w-7xl mx-auto px-3 mt-5" id="section-records">
<div class="flex items-center justify-between mb-4">
<div class="flex items-center gap-3">
<div class="flex gap-2 bg-slate-100 p-1 rounded-2xl" id="records-mode-tabs">
<div class="rec-tab" id="rmode-study" onclick="switchRecordMode('study')">공부시간</div>
<div class="rec-tab" id="rmode-mock" onclick="switchRecordMode('mock')">모의고사</div>
</div>
<div class="flex gap-2 bg-slate-100 p-1 rounded-2xl" id="records-period-tabs">
<div class="rec-tab" id="rtab-week" onclick="switchRecords('week')">주간</div>
<div class="rec-tab" id="rtab-month" onclick="switchRecords('month')">월간</div>
</div>
</div>
<div class="flex gap-2" id="records-nav-btns"></div>
</div>
<div class="fade-up" id="records-container"></div>
</div>
<!-- ══════ Bottom Tab Bar ══════ -->
<div class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex z-50">
<div class="main-tab" id="btab-calendar" onclick="switchTab('calendar')">달력</div>
<div class="main-tab" id="btab-progress" onclick="switchTab('progress')">진도</div>
<div class="main-tab" id="btab-planner" onclick="switchTab('planner')">플래너</div>
<div class="main-tab" id="btab-records" onclick="switchTab('records')">기록</div>
</div>
<script src="sync.js"></script>
</body>
</html>
